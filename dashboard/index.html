<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OniAnime Statisztika</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">

    <!-- Bejelentkezés -->
    <div id="config-section" class="panel">
      <h2 id="login-title">OniAnime Statisztika</h2>
      <p style="text-align:center; color:var(--text-secondary); margin-bottom:20px;" id="login-desc">
        Jelentkezz be a statisztikáidhoz!
      </p>
      <div id="full-login-fields" style="display:none;"></div>
      <div id="simple-login-fields">
        <div class="input-group">
          <label>Felhasználónév</label>
          <input type="text" id="config-username" placeholder="Felhasználónév" autofocus autocomplete="username">
        </div>
        <div class="input-group">
          <label>Jelszó</label>
          <input type="password" id="config-password" placeholder="Jelszó" autocomplete="current-password">
        </div>
      </div>
      <button class="btn-primary" id="btn-connect">Belépés</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" style="display:none;">
      <div class="header">
        <h1>OniAnime Statisztikák</h1>
        <div class="header-controls">
          <button id="btn-logout">Kijelentkezés</button>
        </div>
      </div>

      <div id="loader" class="loader"></div>

      <div id="dashboard-content" style="display:none;">
        <div class="stats-grid">
          <div class="panel stat-card">
            <div class="stat-value" id="stat-total-eps">0</div>
            <div class="stat-label">Megnézett Epizódok</div>
          </div>
          <div class="panel stat-card">
            <div class="stat-value" id="stat-total-time">0h</div>
            <div class="stat-label">Összes Idő (kb)</div>
          </div>
          <div class="panel stat-card">
            <div class="stat-value" id="stat-total-shows">0</div>
            <div class="stat-label">Különböző Animék</div>
          </div>
          <div class="panel stat-card">
            <div class="stat-value" id="stat-this-week">0</div>
            <div class="stat-label">Ezen a héten (ep)</div>
          </div>
        </div>

        <div class="panel data-section">
          <h3>Legutóbb megnézett epizódok</h3>
          <table>
            <thead>
              <tr><th>Anime Cím</th><th>Epizód</th><th>Mikor</th></tr>
            </thead>
            <tbody id="recent-tbody"></tbody>
          </table>
        </div>

        <div class="panel data-section">
          <h3>Legtöbbször nézett animék</h3>
          <table>
            <thead>
              <tr><th>Anime Cím</th><th>Megnézett részek</th></tr>
            </thead>
            <tbody id="shows-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
