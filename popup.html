<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>OniAnime Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">🔥 OniAnime Tracker</span>
    <button id="refresh" class="refresh-btn" title="Frissítés">↻</button>
  </div>

  <!-- Bejelentkezés panel -->
  <div id="tokenPanel" class="token-panel" style="display:none">
    <div class="token-warning">🔒 Bejelentkezés szükséges</div>
    <p class="token-hint">Add meg a webes dashboardhoz használt adataidat:</p>
    <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
      <input id="usernameInput" type="text" placeholder="Felhasználónév (pl. admin)" class="token-input" />
      <input id="passwordInput" type="password" placeholder="Jelszó" class="token-input" />
      <button id="saveToken" class="save-btn" style="width: 100%; margin-left: 0;">Bejelentkezés</button>
    </div>
    <p id="loginError" style="color: #f87171; font-size: 11px; display: none; text-align: center; margin-bottom: 10px;"></p>
    <a href="https://onianime-tracker2.pages.dev/dashboard" target="_blank" class="dashboard-link">
      🌐 Dashboard megnyitása →
    </a>
  </div>

  <!-- Státusz panel -->
  <div id="statusPanel">
    <div id="queueBadge" class="queue-badge" style="display:none"></div>
    <div class="info-grid">
      <div class="info-row">
        <span class="label">Anime</span>
        <span id="animeName" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">Epizód</span>
        <span id="episode" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">Haladás</span>
        <span id="progress" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">Státusz</span>
        <span id="watchStatus" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">Sync</span>
        <span id="syncStatus" class="value">-</span>
      </div>
    </div>
    <div class="footer-actions">
      <a href="https://onianime-tracker2.pages.dev/dashboard" target="_blank" class="dashboard-link-small">
        🌐 Dashboard
      </a>
      <button id="resetToken" class="reset-token-btn">Kijelentkezés</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
