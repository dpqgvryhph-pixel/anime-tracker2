<!DOCTYPE html>
<html lang="hu">
<head>

  <title>OniAnime Tracker</title>
  <link rel="stylesheet" href="popup.css">

      <span>&#40481; OniAnime Tracker</span>

      <div class="title">JELENLEGI EP&#211;Z&#211;D</div>

        <span>Epiz&#243;d:</span>

        <span>Megn&#233;zve:</span>

      </div>
      <div class="row">
        <span>Supabase:</span>

    </div>

    <div class="section" style="text-align:center;">
      <button id="refresh" style="width:100%;">&#8635; Friss&#237;t&#233;s</button>
      <div id="msg"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
